interface:
  display_name: "Obsidian Keyword Explainer"
  short_description: "Explain keywords from Obsidian notes plus web"
  default_prompt: "Use $obsidian-keyword-explainer to use any paper title as a context search query, split paragraph input into semantic units, search knowledge_notes, experiment_notes, idea_notes, and papers for each unit, and finish with per-unit plus whole-paragraph explanations using Obsidian/MathJax-compatible formulas, pseudocode, flowcharts, or scheduling timeline diagrams with detailed annotations."

dependencies:
  tools:
    - type: "mcp"
      value: "obsidian"
      description: "Obsidian vault search and note-reading API"
